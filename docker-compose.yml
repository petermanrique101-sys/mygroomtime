services:
  postgres:
    image: postgres:16-alpine
    container_name: mygroomtime-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mygroomtime
      POSTGRES_PASSWORD: mygroomtime
      POSTGRES_DB: mygroomtime
    volumes:
      - mygroomtime-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mygroomtime"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mygroomtime-redis
    ports:
      - "6379:6379"
    volumes:
      - mygroomtime-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mygroomtime-postgres-data:
  mygroomtime-redis-data:
